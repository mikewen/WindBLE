<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark light">
<title>WindBLE</title>
<style>
/* ── Reset & base ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0a0e1a;
  --bg-card:   #0f1626;
  --bg-card2:  #131b30;
  --border:    #1a2540;
  --text:      #e8f0ff;
  --muted:     #6880a8;
  --apparent:  #00e5ff;
  --true:      #ff6b35;
  --gps:       #4caf50;
  --danger:    #ff5252;
  --warn:      #ffc107;
  --accent:    #4a90ff;
  --north:     #ff4444;
}

/* E-ink / high-contrast override — toggled via ?mode=ink in URL */
body.ink {
  --bg:       #ffffff;
  --bg-card:  #f0f0f0;
  --bg-card2: #e8e8e8;
  --border:   #888888;
  --text:     #000000;
  --muted:    #555555;
  --apparent: #0066cc;
  --true:     #cc3300;
  --gps:      #006600;
  --danger:   #cc0000;
  --accent:   #0044aa;
  --north:    #cc0000;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ── Status bar ─────────────────────────────────────────────── */
#statusBar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  flex-shrink: 0;
}
#statusDot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--danger);
  flex-shrink: 0;
}
#statusDot.connected { background: var(--gps); }
#statusDot.connecting { background: var(--warn); }
#statusText { flex: 1; color: var(--muted); }
#lastUpdate { color: var(--muted); font-size: 11px; }
#modeBtn {
  cursor: pointer;
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg-card2);
  color: var(--accent);
  font-size: 11px;
  font-family: inherit;
}

/* ── Compass canvas ─────────────────────────────────────────── */
#compassWrap {
  display: flex;
  justify-content: center;
  align-items: center;
  flex: 1 0 auto;
  padding: 8px;
  min-height: 0;
}
#compass {
  display: block;
  max-width: min(90vw, 90vh, 420px);
  width: 100%;
  height: auto;
  aspect-ratio: 1;
}

/* ── Data grid ──────────────────────────────────────────────── */
#grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  padding: 6px;
  flex-shrink: 0;
}
.cell {
  background: var(--bg-card2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 4px;
  text-align: center;
}
.cell .lbl {
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  display: block;
  margin-bottom: 2px;
}
.cell .val {
  font-size: 15px;
  font-weight: bold;
  display: block;
  white-space: nowrap;
}
.apparent .val { color: var(--apparent); }
.true     .val { color: var(--true); }
.gps      .val { color: var(--gps); }

/* ── View toggle bar ─────────────────────────────────────────── */
#toggleBar {
  display: flex;
  gap: 6px;
  padding: 6px;
  flex-shrink: 0;
}
.tBtn {
  flex: 1;
  padding: 7px 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-card2);
  color: var(--muted);
  font-family: inherit;
  font-size: 11px;
  cursor: pointer;
  letter-spacing: .08em;
}
.tBtn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--bg-card);
}

/* ── Shift banner ────────────────────────────────────────────── */
#shiftBanner {
  display: none;
  text-align: center;
  padding: 6px;
  font-size: 14px;
  font-weight: bold;
  background: var(--bg-card2);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

/* ── Large number overlay ────────────────────────────────────── */
#largeOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 10;
}
#largeOverlay.show { display: flex; }
#largeLbl  { font-size: 22px; color: var(--muted); letter-spacing: .15em; margin-bottom: 4px; }
#largeVal  { font-size: min(28vw, 160px); font-weight: bold; color: var(--true); line-height: 1; }
#largeUnit { font-size: 28px; color: var(--muted); margin-top: 4px; }
#largeHint { position: absolute; bottom: 16px; font-size: 11px; color: var(--border); }
#largeShift {
  position: absolute; bottom: 48px;
  font-size: 18px; font-weight: bold;
  padding: 8px 20px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-card2);
  display: none;
}

/* ── Responsive: small screens (Kindle 6" ≈ 600px wide) ─────── */
@media (max-width: 480px) {
  .cell .val { font-size: 13px; }
  .cell .lbl { font-size: 8px; }
  #grid { gap: 3px; padding: 4px; }
}
/* Very tall narrow screens — make compass smaller to fit grid */
@media (max-aspect-ratio: 1/2) {
  #compass { max-width: min(80vw, 300px); }
}
</style>
</head>
<body>

<!-- ── Status bar ── -->
<div id="statusBar">
  <div id="statusDot"></div>
  <span id="statusText">Connecting…</span>
  <span id="lastUpdate">--:--:--</span>
  <button id="modeBtn" onclick="toggleInk()">INK MODE</button>
</div>

<!-- ── Compass ── -->
<div id="compassWrap">
  <canvas id="compass"></canvas>
</div>

<!-- ── Data grid ── -->
<div id="grid">
  <div class="cell apparent"><span class="lbl">AWS</span><span class="val" id="dAws">--</span></div>
  <div class="cell apparent"><span class="lbl">AWA</span><span class="val" id="dAwa">--</span></div>
  <div class="cell true">    <span class="lbl">TWS</span><span class="val" id="dTws">--</span></div>
  <div class="cell true">    <span class="lbl">TWA</span><span class="val" id="dTwa">--</span></div>
  <div class="cell true">    <span class="lbl">TWD</span><span class="val" id="dTwd">--</span></div>
  <div class="cell gps">     <span class="lbl">SOG</span><span class="val" id="dSog">--</span></div>
  <div class="cell gps">     <span class="lbl">COG</span><span class="val" id="dCog">--</span></div>
  <div class="cell">         <span class="lbl">HDG</span><span class="val" id="dHdg">--</span></div>
</div>

<!-- ── View toggle ── -->
<div id="toggleBar">
  <button class="tBtn active" id="btnCompass" onclick="setViewMode('compass')">COMPASS</button>
  <button class="tBtn"        id="btnBoat"    onclick="setViewMode('boat')">BOAT</button>
  <button class="tBtn"        id="btnLarge"   onclick="openLarge()">LARGE</button>
</div>

<!-- ── Shift banner ── -->
<div id="shiftBanner"></div>

<!-- ── Large number overlay ── -->
<div id="largeOverlay" onclick="cycleLargeField()">
  <span id="largeLbl">TWA</span>
  <span id="largeVal">---</span>
  <span id="largeUnit">°</span>
  <div  id="largeShift"></div>
  <span id="largeHint">TAP to cycle · HOLD to close</span>
</div>

<script>
'use strict';

// ── State ────────────────────────────────────────────────────────
var state = {
  aws:0, awa:0, tws:0, twa:0, twd:0, sog:0, cog:0, hdg:0, unit:'kt'
};
var viewMode    = 'compass';  // 'compass' | 'boat'
var largeFields = ['TWA','TWS','TWD','AWA','AWS','SOG'];
var largeIdx    = 0;
var inkMode     = window.location.search.indexOf('mode=ink') >= 0;
var canvas, ctx, W, H, R, CX, CY;
var animFrame   = null;
var connected   = false;
var lastTs      = 0;

// ── Init ─────────────────────────────────────────────────────────
window.addEventListener('load', function () {
  canvas = document.getElementById('compass');
  ctx    = canvas.getContext('2d');
  if (inkMode) document.body.classList.add('ink');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Long-press large overlay to close
  var pressTimer;
  document.getElementById('largeOverlay').addEventListener('mousedown',  startPress);
  document.getElementById('largeOverlay').addEventListener('touchstart', startPress, {passive:true});
  document.getElementById('largeOverlay').addEventListener('mouseup',    cancelPress);
  document.getElementById('largeOverlay').addEventListener('touchend',   cancelPress);
  function startPress()  { pressTimer = setTimeout(closeLarge, 700); }
  function cancelPress() { clearTimeout(pressTimer); }

  startConnection();
  drawCompass(); // draw empty compass immediately
});

function resizeCanvas() {
  var wrap = document.getElementById('compassWrap');
  var size = Math.min(wrap.clientWidth - 16, wrap.clientHeight - 16, 420);
  canvas.width  = size;
  canvas.height = size;
  W = H = size;
  CX = CY = size / 2;
  R  = size * 0.44;
  drawCompass();
}

// ── Connection (SSE with polling fallback) ───────────────────────
var es, pollTimer;

function startConnection() {
  setStatus('connecting');
  if (typeof EventSource !== 'undefined') {
    es = new EventSource('/data');
    es.addEventListener('wind', function(e) {
      onData(JSON.parse(e.data));
    });
    es.addEventListener('shift', function(e) {
      onShift(JSON.parse(e.data));
    });
    es.onopen  = function() { setStatus('connected'); };
    es.onerror = function() {
      setStatus('disconnected');
      es.close();
      startPolling(); // fall back to polling
    };
  } else {
    startPolling();
  }
}

function startPolling() {
  setStatus('connecting');
  pollTimer = setInterval(function() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/snapshot', true);
    xhr.timeout = 5000;
    xhr.onload = function() {
      if (xhr.status === 200) {
        try { onData(JSON.parse(xhr.responseText)); setStatus('connected'); }
        catch(e) {}
      } else { setStatus('disconnected'); }
    };
    xhr.onerror   = function() { setStatus('disconnected'); };
    xhr.ontimeout = function() { setStatus('disconnected'); };
    xhr.send();
  }, 2000);
}

function onData(d) {
  state = d;
  state.unit = d.unit || 'kt';
  lastTs = Date.now();
  updateGrid();
  if (animFrame === null) animFrame = requestAnimationFrame(drawCompass);
  updateLargeOverlay();
  updateLastUpdateTime();
}

function onShift(d) {
  var isLift = d.type === 'LIFT';
  var msg = (isLift ? '▲ LIFT' : '▼ HEADER') +
            '  ' + (d.shift > 0 ? '+' : '') + d.shift.toFixed(0) + '°' +
            '  TWD ' + d.twd.toFixed(0) + '°';
  var banner = document.getElementById('shiftBanner');
  banner.textContent = msg;
  banner.style.display = 'block';
  banner.style.color = isLift ? 'var(--gps)' : 'var(--danger)';
  clearTimeout(banner._t);
  banner._t = setTimeout(function() { banner.style.display = 'none'; }, 8000);

  // Also show in large overlay
  var ls = document.getElementById('largeShift');
  ls.textContent = msg;
  ls.style.color = isLift ? 'var(--gps)' : 'var(--danger)';
  ls.style.display = 'block';
  clearTimeout(ls._t);
  ls._t = setTimeout(function() { ls.style.display = 'none'; }, 5000);
}

// ── Status ───────────────────────────────────────────────────────
function setStatus(s) {
  connected = s === 'connected';
  var dot  = document.getElementById('statusDot');
  var text = document.getElementById('statusText');
  dot.className = s;
  if (s === 'connected')    { text.textContent = 'Connected'; }
  else if (s === 'connecting') { text.textContent = 'Connecting…'; }
  else                         { text.textContent = 'Disconnected — retrying'; }
}

function updateLastUpdateTime() {
  var d = new Date(lastTs);
  var hh = String(d.getHours()).padStart(2,'0');
  var mm = String(d.getMinutes()).padStart(2,'0');
  var ss = String(d.getSeconds()).padStart(2,'0');
  document.getElementById('lastUpdate').textContent = hh+':'+mm+':'+ss;
}

// ── Data grid ────────────────────────────────────────────────────
function fmtSpeed(ms) {
  var u = state.unit || 'kt';
  if (u === 'm/s') return ms.toFixed(1) + ' m/s';
  if (u === 'km/h') return (ms * 3.6).toFixed(1) + ' kh';
  return (ms * 1.944).toFixed(1) + ' kt';
}
function updateGrid() {
  document.getElementById('dAws').textContent = fmtSpeed(state.aws);
  document.getElementById('dAwa').textContent = state.awa.toFixed(1) + '°';
  document.getElementById('dTws').textContent = fmtSpeed(state.tws);
  document.getElementById('dTwa').textContent = state.twa.toFixed(1) + '°';
  document.getElementById('dTwd').textContent = state.twd.toFixed(0) + '°T';
  document.getElementById('dSog').textContent = fmtSpeed(state.sog);
  document.getElementById('dCog').textContent = state.cog.toFixed(0) + '°T';
  document.getElementById('dHdg').textContent = state.hdg.toFixed(0) + '°T';
}

// ── View mode ────────────────────────────────────────────────────
function setViewMode(m) {
  viewMode = m;
  document.getElementById('btnCompass').classList.toggle('active', m === 'compass');
  document.getElementById('btnBoat').classList.toggle('active', m === 'boat');
  if (animFrame === null) animFrame = requestAnimationFrame(drawCompass);
}

// ── Large number overlay ─────────────────────────────────────────
function openLarge() {
  document.getElementById('largeOverlay').classList.add('show');
  updateLargeOverlay();
}
function closeLarge() {
  document.getElementById('largeOverlay').classList.remove('show');
}
function cycleLargeField() {
  largeIdx = (largeIdx + 1) % largeFields.length;
  updateLargeOverlay();
}
var LARGE_COLORS = {
  TWA:'var(--true)', TWS:'var(--true)', TWD:'var(--true)',
  AWA:'var(--apparent)', AWS:'var(--apparent)', SOG:'var(--gps)'
};
function updateLargeOverlay() {
  var field = largeFields[largeIdx];
  var val, unit;
  switch(field) {
    case 'TWA': val = state.twa.toFixed(0); unit = '°'; break;
    case 'TWS': val = (state.tws*1.944).toFixed(1); unit = state.unit||'kt'; break;
    case 'TWD': val = state.twd.toFixed(0); unit = '°T'; break;
    case 'AWA': val = state.awa.toFixed(0); unit = '°'; break;
    case 'AWS': val = (state.aws*1.944).toFixed(1); unit = state.unit||'kt'; break;
    case 'SOG': val = (state.sog*1.944).toFixed(1); unit = state.unit||'kt'; break;
    default: val = '--'; unit = '';
  }
  document.getElementById('largeLbl').textContent = field;
  document.getElementById('largeVal').textContent = val;
  document.getElementById('largeVal').style.color = LARGE_COLORS[field] || 'var(--text)';
  document.getElementById('largeUnit').textContent = unit;
}

// ── Ink mode toggle ──────────────────────────────────────────────
function toggleInk() {
  inkMode = !inkMode;
  document.body.classList.toggle('ink', inkMode);
  if (animFrame === null) animFrame = requestAnimationFrame(drawCompass);
}

// ── Compass drawing ───────────────────────────────────────────────
function getVar(name) {
  return getComputedStyle(document.body).getPropertyValue(name).trim();
}

function drawCompass() {
  animFrame = null;
  if (!ctx) return;
  ctx.clearRect(0, 0, W, H);

  var ink = document.body.classList.contains('ink');

  // Colors from CSS variables
  var cBg      = ink ? '#ffffff' : '#0a0e1a';
  var cRing    = ink ? '#e8e8e8' : '#1a2540';
  var cBorder  = ink ? '#888888' : '#2a3a60';
  var cTick    = ink ? '#aaaaaa' : '#3a5080';
  var cCard    = ink ? '#0066cc' : '#7ab4ff';
  var cNorth   = ink ? '#cc0000' : '#ff4444';
  var cApparent= ink ? '#0066cc' : '#00e5ff';
  var cTrue    = ink ? '#cc3300' : '#ff6b35';
  var cBoat    = ink ? '#333333' : '#a0c0ff';
  var cText    = ink ? '#000000' : '#e8f0ff';

  // Background
  ctx.fillStyle = cBg;
  ctx.fillRect(0, 0, W, H);

  var compassRotation = (viewMode === 'compass') ? -degToRad(state.hdg) : 0;

  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(compassRotation);
  drawRing(cRing, cBorder, cTick, cCard, cNorth, ink);
  ctx.restore();

  // Wind arrows (in boat frame always; compass mode rotates the ring not the arrows)
  ctx.save();
  ctx.translate(CX, CY);
  var apparentAngle = (viewMode === 'boat') ? state.awa : state.hdg + state.awa;
  var trueAngle     = (viewMode === 'boat') ? state.twa : state.twd;
  drawArrow(trueAngle,     R * 0.55, R * 0.12, cTrue,     true);
  drawArrow(apparentAngle, R * 0.50, R * 0.12, cApparent, false);
  ctx.restore();

  // Boat icon
  ctx.save();
  ctx.translate(CX, CY);
  drawBoat(cBoat, ink);
  ctx.restore();

  // Speed labels below compass
  drawSpeedBoxes(cApparent, cTrue, cText, ink);
}

function drawRing(cRing, cBorder, cTick, cCard, cNorth, ink) {
  // Fill
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI*2);
  ctx.fillStyle = cRing;
  ctx.fill();

  // Outer border
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI*2);
  ctx.strokeStyle = cBorder;
  ctx.lineWidth = ink ? 2 : 2.5;
  ctx.stroke();

  // Inner ring
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.75, 0, Math.PI*2);
  ctx.strokeStyle = cBorder;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Degree ticks
  for (var deg = 0; deg < 360; deg += 5) {
    var rad  = degToRad(deg);
    var sin  = Math.sin(rad), cos = Math.cos(rad);
    var outer = R - 3;
    var inner, lw, color;
    if (deg % 90 === 0)      { inner = R*0.78; lw = 3; color = cCard; }
    else if (deg % 45 === 0) { inner = R*0.82; lw = 2; color = cBorder; }
    else if (deg % 10 === 0) { inner = R*0.86; lw = 1.5; color = cTick; }
    else                     { inner = R*0.90; lw = 1; color = ink ? '#cccccc' : '#253050'; }
    ctx.beginPath();
    ctx.moveTo(inner*sin, -inner*cos);
    ctx.lineTo(outer*sin, -outer*cos);
    ctx.strokeStyle = color;
    ctx.lineWidth = lw;
    ctx.stroke();
  }

  // Cardinal labels
  var cardinals = ['N','E','S','W'];
  var cardDegs  = [0, 90, 180, 270];
  var labelR    = R * 0.635;
  var fontSize  = Math.max(12, R * 0.13);
  ctx.font = 'bold ' + fontSize + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (var i = 0; i < 4; i++) {
    var r = degToRad(cardDegs[i]);
    var x = labelR * Math.sin(r);
    var y = -labelR * Math.cos(r);
    ctx.fillStyle = (i === 0) ? cNorth : cCard;
    ctx.fillText(cardinals[i], x, y);
  }
}

function drawArrow(angleDeg, len, headLen, color, filled) {
  var rad  = degToRad(angleDeg);
  var sin  = Math.sin(rad), cos = Math.cos(rad);
  var tipX = sin * len, tipY = -cos * len;

  // Shaft
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(tipX, tipY);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Arrowhead
  var ha = degToRad(30);
  var hx1 = tipX - headLen * Math.sin(rad - ha);
  var hy1 = tipY + headLen * Math.cos(rad - ha);
  var hx2 = tipX - headLen * Math.sin(rad + ha);
  var hy2 = tipY + headLen * Math.cos(rad + ha);
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(hx1, hy1);
  ctx.lineTo(hx2, hy2);
  ctx.closePath();
  if (filled) {
    ctx.fillStyle = color;
    ctx.fill();
  } else {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawBoat(color, ink) {
  var s = R * 0.16;
  ctx.beginPath();
  ctx.moveTo(0, -s*1.4);
  ctx.lineTo( s*0.55, s*0.3);
  ctx.lineTo( s*0.3,  s*0.7);
  ctx.lineTo(-s*0.3,  s*0.7);
  ctx.lineTo(-s*0.55, s*0.3);
  ctx.closePath();
  ctx.strokeStyle = color;
  ctx.lineWidth = ink ? 2 : 2.5;
  ctx.stroke();
  // Mast
  ctx.beginPath();
  ctx.moveTo(0, -s*0.6);
  ctx.lineTo(0, s*0.3);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawSpeedBoxes(cApparent, cTrue, cText, ink) {
  var boxW  = R * 0.6;
  var boxH  = R * 0.45;
  var boxY  = CY + R * 1.0;
  var gap   = R * 0.65;
  if (boxY + boxH > H - 4) return; // no room

  drawDataBox(CX - gap*0.5, boxY, boxW, boxH,
              cApparent, 'AWS', fmtSpeed(state.aws), state.awa.toFixed(0)+'°', ink);
  drawDataBox(CX + gap*0.5, boxY, boxW, boxH,
              cTrue, 'TWS', fmtSpeed(state.tws),
              (viewMode==='compass' ? state.twd : state.twa).toFixed(0)+'°', ink);
}

function drawDataBox(cx, cy, w, h, color, label, speed, angle, ink) {
  var l = cx - w/2, t = cy - h/2;

  // Background
  ctx.fillStyle = ink ? 'rgba(240,240,240,0.9)' : 'rgba(10,18,40,0.85)';
  roundRect(l, t, w, h, 8);
  ctx.fill();

  // Border
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  roundRect(l, t, w, h, 8);
  ctx.stroke();

  ctx.textAlign = 'center';

  // Label
  ctx.fillStyle = color;
  ctx.font = 'bold ' + Math.max(9, R*0.075) + 'px sans-serif';
  ctx.fillText(label, cx, t + h*0.24);

  // Speed value
  ctx.fillStyle = ink ? '#000' : '#fff';
  ctx.font = 'bold ' + Math.max(12, R*0.16) + 'px monospace';
  ctx.fillText(speed, cx, t + h*0.57);

  // Angle
  ctx.fillStyle = ink ? '#444' : '#a0c0e0';
  ctx.font = Math.max(9, R*0.10) + 'px monospace';
  ctx.fillText(angle, cx, t + h*0.85);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);   ctx.arcTo(x+w, y,   x+w, y+r,   r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);   ctx.arcTo(x,   y+h, x, y+h-r,   r);
  ctx.lineTo(x, y+r);     ctx.arcTo(x,   y,   x+r, y,      r);
  ctx.closePath();
}

function fmtSpeed(ms) {
  var u = state.unit || 'kt';
  if (u === 'm/s')  return ms.toFixed(1) + ' m/s';
  if (u === 'km/h') return (ms * 3.6).toFixed(1) + ' kh';
  return (ms * 1.944).toFixed(1) + ' kt';
}

function degToRad(d) { return d * Math.PI / 180; }
</script>
